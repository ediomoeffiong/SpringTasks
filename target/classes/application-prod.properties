# Production Environment Properties
spring.datasource.driverClassName=org.postgresql.Driver

# In Spring Boot, setting the driver class and dialect is often enough if you provide
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD directly in Render.
# If Render gave you a single connection string like DATABASE_URL as an env var, 
# you might need to map it here (example: spring.datasource.url=${DATABASE_URL} ).
# Assuming you used standard Spring Boot env vars:

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable the H2 Console for security in production
spring.h2.console.enabled=false

# Render handles SSL for Postgres, you might need to append ?sslmode=require 
# to your JDBC url if it's strict, but usually Render's internal connections don't require it.
