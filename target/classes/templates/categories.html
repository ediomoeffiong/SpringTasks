<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Manage Categories</title>
    <style>
        /* Modern Dark/Glass Theme Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 1rem;
            transition: all 0.2s ease-in-out;
        }

        .workspace-header {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            border-radius: 1rem;
            padding: 2rem;
            border-left: 4px solid var(--primary-color);
        }

        /* Category Card Hover States */
        .category-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        
        .category-accent-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            transition: width 0.2s;
        }
        .category-card:hover .category-accent-bar {
            width: 8px;
        }

        /* Stats Cards */
        .stat-icon-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            padding: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Color Picker Swatches */
        .color-swatch-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        .color-swatch.active {
            border-color: white;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        /* Modals */
        .glass-modal .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 1.5rem;
        }
        .glass-modal .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        /* Task Item inside Category View */
        .task-list-item {
            border-left: 3px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }
        .task-list-item:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        
        <!-- 1. Header -->
        <div class="workspace-header mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-4">
            <div>
                <h2 class="fw-bold mb-2 text-primary"><i class="bi bi-tags me-2"></i>Categories</h2>
                <p class="text-muted mb-0" >Organize and group your tasks using custom categories.</p>
            </div>
            <div class="d-flex align-items-center gap-3 w-100 w-md-auto">
                <div class="input-group" style="max-width: 300px;">
                    <span class="input-group-text bg-transparent border-0 text-muted ps-3 position-absolute z-3" style="top: 50%; transform: translateY(-50%);">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control rounded-pill ps-5 py-2 text-primary" 
                           placeholder="Search categories..." 
                           style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                </div>
                <button class="btn btn-primary rounded-pill px-4 py-2 fw-semibold shadow-sm text-nowrap" onclick="openFormModal()">
                    <i class="bi bi-plus-lg me-1"></i> New Category
                </button>
            </div>
        </div>

        <!-- 2. Categories Overview Cards (Stats) -->
        <div class="row row-cols-1 row-cols-md-3 g-4 mb-4" id="statsContainer">
            <!-- Rendered by JS -->
            <div class="col"><div class="glass-card p-4"><div class="placeholder-glow"><span class="placeholder col-6"></span><span class="placeholder col-12 mt-2" style="height:2rem;"></span></div></div></div>
            <div class="col"><div class="glass-card p-4"><div class="placeholder-glow"><span class="placeholder col-6"></span><span class="placeholder col-12 mt-2" style="height:2rem;"></span></div></div></div>
            <div class="col"><div class="glass-card p-4"><div class="placeholder-glow"><span class="placeholder col-6"></span><span class="placeholder col-12 mt-2" style="height:2rem;"></span></div></div></div>
        </div>

        <!-- 3 & 4. Categories Main Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 mb-4" id="categoriesGrid">
            <!-- Cards rendered by JS -->
        </div>

        <!-- 7. Empty State -->
        <div id="emptyState" class="text-center py-5 d-none glass-card">
            <i class="bi bi-tags text-muted display-1  mb-3"></i>
            <h4 class="text-primary">No categories found</h4>
            <p class="text-muted">You haven't created any categories matching this view.</p>
            <button class="btn btn-primary rounded-pill mt-2 px-4" onclick="openFormModal()"><i class="bi bi-plus-lg me-1"></i> Create Category</button>
        </div>


        <!-- 6. Category Details Drawer / Modal -->
        <div class="modal fade glass-modal" id="categoryDetailsModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
                <div class="modal-content text-start border-0">
                    <div class="modal-header border-bottom border-light border-opacity-10 pb-4 position-relative overflow-hidden">
                        <div id="detailAccentTop" class="position-absolute top-0 start-0 w-100" style="height: 6px; background-color: var(--primary-color);"></div>
                        <div class="d-flex flex-column w-100 pt-2">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-light bg-opacity-10 text-primary rounded-pill px-3 py-2 fw-normal" style="letter-spacing: 0.05em; font-size: 0.75rem;">
                                    <i class="bi bi-tag-fill me-1" id="detailIconColor"></i> CATEGORY DETAILS
                                </span>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <h3 class="modal-title fw-bold text-primary mb-2" id="detailTitle">Category Name</h3>
                            <p class="text-muted mb-0" id="detailDescription">Category description text goes here.</p>
                            
                            <div class="d-flex align-items-center gap-3 mt-3">
                                <div class="bg-dark bg- px-3 py-2 rounded-3 border border-secondary border-opacity-25 d-inline-flex align-items-center">
                                    <i class="bi bi-list-task text-muted me-2"></i> 
                                    <span class="text-primary fw-bold me-1" id="detailTaskCount">0</span> 
                                    <span class="text-muted small">Tasks</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modal-body custom-scrollbar text-primary p-0">
                        <div class="p-4 bg-dark bg-opacity-25 border-bottom border-light border-opacity-10">
                            <h6 class="text-uppercase small fw-bold mb-0 " style="letter-spacing: 0.05em;">Associated Tasks</h6>
                        </div>
                        <div id="detailTasksList" class="d-flex flex-column">
                            <!-- Tasks injected here via JS -->
                        </div>
                    </div>
                    
                    <div class="modal-footer border-top border-light border-opacity-10 py-3 px-4 d-flex justify-content-between bg-dark bg-">
                        <button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="deleteCurrentCategory()">
                            <i class="bi bi-trash me-1"></i> Delete Category
                        </button>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary btn-sm rounded-pill px-4 shadow-sm" onclick="editCurrentCategory()">
                                <i class="bi bi-pencil me-1"></i> Edit
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- 5. Create / Edit Category Modal -->
        <div class="modal fade glass-modal" id="categoryFormModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content text-start border-0">
                    <div class="modal-header border-bottom border-light border-opacity-10">
                        <h5 class="modal-title fw-bold text-primary" id="formModalTitle">Create Category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body custom-scrollbar pt-4 text-primary">
                        <form id="categoryForm">
                            <input type="hidden" id="formCatId">
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Name *</label>
                                <input type="text" id="formCatName" class="form-control form-control-lg bg-transparent text-primary border-secondary shadow-none" placeholder="e.g. Design, Frontend, Personal" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Description</label>
                                <textarea id="formCatDesc" class="form-control bg-transparent text-primary border-secondary shadow-none" rows="2" placeholder="What is this category for?"></textarea>
                            </div>
                            <div class="mb-2">
                                <label class="form-label text-muted small fw-bold d-block">Theme Color *</label>
                                <div class="color-swatch-container" id="colorSwatches">
                                    <!-- Swatches injected by JS -->
                                </div>
                                <input type="hidden" id="formCatColor" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-top border-light border-opacity-10 py-3">
                        <button type="button" class="btn btn-link text-muted text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="saveCategory()">Save Category</button>
                    </div>
                </div>
            </div>
        </div>

        
        <!-- MOCK DATA & APP LOGIC SCRIPT -->
        <script>
            // --- 0. State variables ---
            let searchQuery = '';
            let viewingCatId = null;
            let editingCatId = null;

            // Pre-defined Color Palette
            const PALETTE = [
                { hex: '#ef4444', name: 'Red' },
                { hex: '#f97316', name: 'Orange' },
                { hex: '#f59e0b', name: 'Yellow' },
                { hex: '#10b981', name: 'Emerald' },
                { hex: '#06b6d4', name: 'Cyan' },
                { hex: '#3b82f6', name: 'Blue' },
                { hex: '#6366f1', name: 'Indigo' },
                { hex: '#a855f7', name: 'Purple' },
                { hex: '#ec4899', name: 'Pink' },
                { hex: '#64748b', name: 'Slate' }
            ];

            // Live Data Fetch
            let mockCategories = [];
            let mockTasks = [];

            async function loadData() {
                try {
                    const [catRes, taskRes] = await Promise.all([
                        fetch('/api/categories'),
                        fetch('/api/tasks')
                    ]);
                    
                    if (catRes.ok) mockCategories = await catRes.json();
                    if (taskRes.ok) {
                        const rawTasks = await taskRes.json();
                        mockTasks = rawTasks.map(t => {
                            let status = t.completed ? 'completed' : 'pending';
                            const due = t.dueDate ? t.dueDate.split('T')[0] : '';
                            if (!t.completed && due) {
                                const dueDateObj = new Date(due);
                                dueDateObj.setHours(0,0,0,0);
                                const today = new Date();
                                today.setHours(0,0,0,0);
                                if (dueDateObj < today) status = 'overdue';
                            }
                            return { ...t, status: status };
                        });
                    }
                    
                    renderCategories();
                    renderStats();
                } catch(e) {
                    console.error("Error loading category data: ", e);
                }
            }

            // Bootstrap Modals
            let detailsModal;
            let formModal;

            // --- 1. Initialization ---
            document.addEventListener('DOMContentLoaded', () => {
                detailsModal = new bootstrap.Modal(document.getElementById('categoryDetailsModal'));
                formModal = new bootstrap.Modal(document.getElementById('categoryFormModal'));

                initColorSwatches();
                attachEventListeners();
                
                loadData();
            });

            // --- 2. Event Listeners & Init ---
            function initColorSwatches() {
                const container = document.getElementById('colorSwatches');
                let html = '';
                PALETTE.forEach(c => {
                    html += `<div class="color-swatch shadow-sm" style="background-color: ${c.hex};" data-color="${c.hex}" title="${c.name}" onclick="selectColor('${c.hex}')"></div>`;
                });
                container.innerHTML = html;
            }

            function selectColor(hex) {
                document.getElementById('formCatColor').value = hex;
                document.querySelectorAll('.color-swatch').forEach(el => {
                    if (el.dataset.color === hex) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                });
            }

            function attachEventListeners() {
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase();
                    renderCategories();
                });
            }

            // --- 3. Render Logic ---
            function renderStats() {
                const statsContainer = document.getElementById('statsContainer');
                
                const total = mockCategories.length;
                let mostUsed = { name: '-', count: -1 };
                let leastUsed = { name: '-', count: 999999 };

                if (total > 0) {
                    mockCategories.forEach(c => {
                        const count = mockTasks.filter(t => t.categoryId === c.id).length;
                        if (count > mostUsed.count) mostUsed = { name: c.name, count: count };
                        if (count < leastUsed.count) leastUsed = { name: c.name, count: count };
                    });
                }

                statsContainer.innerHTML = `
                    <div class="col">
                        <div class="glass-card p-4 h-100 d-flex align-items-center gap-3">
                            <div class="stat-icon-wrapper" style="color: #60a5fa; background: rgba(96, 165, 250, 0.1);">
                                <i class="bi bi-collection fs-3"></i>
                            </div>
                            <div>
                                <p class="text-muted small text-uppercase fw-bold mb-1" style="letter-spacing: 0.05em;">Total Categories</p>
                                <h3 class="fw-bold text-primary mb-0">${total}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="glass-card p-4 h-100 d-flex align-items-center gap-3">
                            <div class="stat-icon-wrapper" style="color: #34d399; background: rgba(52, 211, 153, 0.1);">
                                <i class="bi bi-graph-up-arrow fs-3"></i>
                            </div>
                            <div class="text-truncate">
                                <p class="text-muted small text-uppercase fw-bold mb-1" style="letter-spacing: 0.05em;">Most Active</p>
                                <h4 class="fw-bold text-primary mb-0 text-truncate">${mostUsed.name}</h4>
                                <small class="text-muted">${mostUsed.count > 0 ? mostUsed.count + ' tasks' : '0 tasks'}</small>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="glass-card p-4 h-100 d-flex align-items-center gap-3">
                            <div class="stat-icon-wrapper" style="color: #f87171; background: rgba(248, 113, 113, 0.1);">
                                <i class="bi bi-graph-down-arrow fs-3"></i>
                            </div>
                            <div class="text-truncate">
                                <p class="text-muted small text-uppercase fw-bold mb-1" style="letter-spacing: 0.05em;">Least Active</p>
                                <h4 class="fw-bold text-primary mb-0 text-truncate">${leastUsed.name}</h4>
                                <small class="text-muted">${leastUsed.count !== 999999 ? leastUsed.count + ' tasks' : '0 tasks'}</small>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderCategories() {
                const grid = document.getElementById('categoriesGrid');
                const empty = document.getElementById('emptyState');

                const filtered = mockCategories.filter(c => c.name.toLowerCase().includes(searchQuery));

                if (filtered.length === 0) {
                    grid.innerHTML = '';
                    empty.classList.remove('d-none');
                    return;
                } else {
                    empty.classList.add('d-none');
                }

                let html = '';
                filtered.forEach(c => {
                    const relatedTasks = mockTasks.filter(t => t.categoryId === c.id);
                    const taskCount = relatedTasks.length;
                    
                    // Sneak peek of the last task added to this category
                    let previewHtml = `<span class="text-muted small fst-italic">No tasks yet</span>`;
                    if (taskCount > 0) {
                        const lastTask = relatedTasks[relatedTasks.length - 1]; // Assume last is newest for mock
                        let icon = '<i class="bi bi-circle text-muted"></i>';
                        if(lastTask.status==='completed') icon = '<i class="bi bi-check-circle-fill text-success"></i>';
                        else if(lastTask.status==='overdue') icon = '<i class="bi bi-exclamation-circle-fill text-danger"></i>';
                        
                        previewHtml = `<div class="d-flex align-items-center gap-2 text-truncate ">
                            ${icon} <span class="text-primary small text-truncate">${lastTask.title}</span>
                        </div>`;
                    }

                    html += `
                        <div class="col">
                            <div class="card h-100 glass-card category-card" onclick="openDetails(${c.id})">
                                <div class="category-accent-bar" style="background-color: ${c.color};"></div>
                                <div class="card-body p-4 ps-4">
                                    <div class="d-flex justify-content-between align-items-start mb-2 ps-3">
                                        <h5 class="fw-bold text-primary mb-0 d-flex align-items-center gap-2">
                                            <i class="bi bi-tag-fill" style="color: ${c.color};"></i> ${c.name}
                                        </h5>
                                        
                                        <div class="dropdown" onclick="event.stopPropagation()">
                                            <button class="btn btn-link text-muted p-0" type="button" data-bs-toggle="dropdown">
                                                <i class="bi bi-three-dots"></i>
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark border-secondary shadow">
                                                <li><a class="dropdown-item" href="javascript:void(0)" onclick="editCategory(${c.id})"><i class="bi bi-pencil me-2"></i>Edit</a></li>
                                                <li><hr class="dropdown-divider border-secondary"></li>
                                                <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="deleteCategory(${c.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                                            </ul>
                                        </div>
                                    </div>
                                    
                                    <div class="ps-3 mb-4">
                                        <span class="badge bg-dark border border-secondary text-muted fw-normal">${taskCount} task${taskCount !== 1 ? 's' : ''}</span>
                                    </div>
                                    
                                    <div class="ps-3 border-top border-light border-opacity-10 pt-3">
                                        <p class="text-muted small text-uppercase fw-bold mb-2" style="letter-spacing: 0.05em; font-size: 0.65rem;">Latest Task</p>
                                        ${previewHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            }

            // --- 4. Modals / CRUD Actions ---
            function openDetails(id) {
                viewingCatId = id;
                const cat = mockCategories.find(c => c.id === id);
                if(!cat) return;

                document.getElementById('detailAccentTop').style.backgroundColor = cat.color;
                document.getElementById('detailIconColor').style.color = cat.color;
                document.getElementById('detailTitle').innerText = cat.name;
                document.getElementById('detailDescription').innerText = cat.description || "No description provided.";

                const relatedTasks = mockTasks.filter(t => t.categoryId === id);
                document.getElementById('detailTaskCount').innerText = relatedTasks.length;

                const listContainer = document.getElementById('detailTasksList');
                if (relatedTasks.length === 0) {
                    listContainer.innerHTML = `
                        <div class="text-center py-5 ">
                            <i class="bi bi-list-task fs-2 mb-2"></i>
                            <p class="mb-0">No tasks in this category.</p>
                        </div>
                    `;
                } else {
                    let html = '';
                    relatedTasks.forEach(t => {
                        let classNm = t.status === 'completed' ? 'text-decoration-line-through ' : '';
                        let icon = '<i class="bi bi-circle text-muted fs-5"></i>';
                        if(t.status==='completed') icon = '<i class="bi bi-check-circle-fill text-success fs-5"></i>';
                        else if(t.status==='overdue') icon = '<i class="bi bi-exclamation-circle-fill text-danger fs-5"></i>';

                        html += `
                            <div class="task-list-item d-flex align-items-center gap-3 p-3 px-4 border-bottom border-light border-opacity-10" style="border-left-color: ${cat.color} !important;">
                                ${icon}
                                <div class="flex-grow-1">
                                    <h6 class="mb-0 text-primary ${classNm}">${t.title}</h6>
                                </div>
                                <span class="badge bg-secondary bg-opacity-25 text-primary fw-normal">${t.status}</span>
                            </div>
                        `;
                    });
                    listContainer.innerHTML = html;
                }

                detailsModal.show();
            }

            function openFormModal() {
                editingCatId = null;
                document.getElementById('categoryForm').reset();
                document.getElementById('formModalTitle').innerText = "Create Category";
                selectColor(PALETTE[0].hex); // default color
                formModal.show();
            }

            function editCategory(id) {
                editingCatId = id;
                const cat = mockCategories.find(c => c.id === id);
                if(!cat) return;

                document.getElementById('formModalTitle').innerText = "Edit Category";
                document.getElementById('formCatId').value = cat.id;
                document.getElementById('formCatName').value = cat.name;
                document.getElementById('formCatDesc').value = cat.description;
                selectColor(cat.color);

                formModal.show();
            }

            function editCurrentCategory() {
                detailsModal.hide();
                editCategory(viewingCatId);
            }

            async function deleteCategory(id) {
                if(confirm("Are you sure you want to delete this category? Associated tasks will be uncategorized.")) {
                    try {
                        await fetch(`/api/categories/${id}`, { method: 'DELETE' });
                        detailsModal.hide();
                        await loadData();
                    } catch(e) {
                        console.error("Failed to delete category: ", e);
                    }
                }
            }

            function deleteCurrentCategory() {
                if(viewingCatId) {
                    deleteCategory(viewingCatId);
                    detailsModal.hide();
                }
            }

            async function saveCategory() {
                const name = document.getElementById('formCatName').value.trim();
                const desc = document.getElementById('formCatDesc').value.trim();
                const color = document.getElementById('formCatColor').value;

                if (!name) {
                    alert('Category name is required.');
                    return;
                }
                if (!color) {
                    alert('Please select a theme color.');
                    return;
                }

                const payload = { name, description: desc, color };

                try {
                    if (editingCatId) {
                        await fetch(`/api/categories/${editingCatId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        await fetch(`/api/categories`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }
                    
                    formModal.hide();
                    await loadData();
                } catch(e) {
                    console.error("Failed to save category.", e);
                }
            }
        </script>
    </div>
</body>
</html>
