<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Login | SpringTasks</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-body">
    <div layout:fragment="content">
        <div class="auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="/" class="auth-brand">
                    <i class="bi bi-layers-fill me-2"></i>SpringTasks
                </a>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Log in to manage your tasks effectively</p>
            </div>

            <div th:if="${param.signupSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
                Registration successful! You can now log in.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                Invalid email or password.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show" role="alert">
                You have been logged out.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="username" placeholder="name@example.com"
                        required autocomplete="email">
                    <label for="email">Email address</label>
                    <div class="invalid-feedback">Please enter a valid email.</div>
                </div>

                <div class="form-floating mb-3 password-wrapper">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required autocomplete="current-password">
                    <label for="password">Password</label>
                    <i class="bi bi-eye password-toggle" id="toggle-password"></i>
                    <div class="invalid-feedback">Password is required.</div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me">
                        <label class="form-check-label text-muted small" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="text-primary small text-decoration-none fw-bold">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-auth">
                    <span>Log In</span>
                    <img src="https://i.gifer.com/ZZ5H.gif" class="loading-spinner" alt="loading">
                </button>

                <div class="text-center mt-4">
                    <p class="text-muted small">Don't have an account?
                        <a th:href="@{/signup}" class="text-primary fw-bold text-decoration-none">Sign Up</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
