<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Task Calendar</title>
    <style>
        /* Modern Dark/Glass Theme Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 1rem;
            transition: all 0.2s ease-in-out;
        }

        .workspace-header {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            border-radius: 1rem;
            padding: 2rem;
            border-left: 4px solid var(--primary-color);
        }

        /* Calendar Grid System */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: rgba(255, 255, 255, 0.1); /* Creates 1px borders via gap */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .calendar-day-header {
            background: rgba(15, 23, 42, 0.8);
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.75rem;
            text-align: center;
        }

        .calendar-cell {
            background: rgba(15, 23, 42, 0.6);
            min-height: 120px;
            padding: 0.5rem;
            position: relative;
            transition: background 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        @media (max-width: 768px) {
            .calendar-cell { min-height: 80px; }
        }

        .calendar-cell:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-cell.other-month {
            background: rgba(15, 23, 42, 0.4);
            opacity: 0.5;
        }

        .calendar-cell.today {
            background: rgba(79, 70, 229, 0.15);
        }

        .calendar-cell.today .date-number {
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .date-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.25rem;
            text-align: right;
            padding-right: 0.25rem;
        }

        /* Task Items in Calendar */
        .cal-task-item {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            position: relative;
            z-index: 10;
        }
        
        .cal-task-item:hover {
            transform: scale(1.02);
            z-index: 20;
            opacity: 0.9;
        }

        .task-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; border-left: 2px solid #34d399; }
        .task-pending { background: rgba(79, 70, 229, 0.2); color: #818cf8; border-left: 2px solid #818cf8; }
        .task-overdue { background: rgba(239, 68, 68, 0.2); color: #f87171; border-left: 2px solid #f87171; }
        
        .more-tasks-btn {
            font-size: 0.7rem;
            color: #94a3b8;
            background: transparent;
            border: none;
            text-align: left;
            padding: 0.2rem;
            font-weight: 600;
            margin-top: auto;
        }
        .more-tasks-btn:hover { color: white; text-decoration: underline; }

        /* Sidebar Item */
        .sidebar-task {
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-task.pending { border-left-color: #818cf8; }
        .sidebar-task.completed { border-left-color: #34d399; }
        .sidebar-task.overdue { border-left-color: #f87171; }
        .sidebar-task:hover { background: rgba(255,255,255,0.05); }

        /* Modals */
        .glass-modal .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 1.5rem;
        }
        .glass-modal .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        /* Drag UI Feedback (Optional) */
        .dragging { opacity: 0.5; }
        .drag-over { background: rgba(255,255,255,0.1) !important; }

    </style>
</head>

<body>
    <div layout:fragment="content">
        
        <!-- 1. Header -->
        <div class="workspace-header mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-4">
            <div>
                <h2 class="fw-bold mb-2 text-primary"><i class="bi bi-calendar3 me-2"></i>Calendar</h2>
                <p class="text-muted mb-0" >Plan and manage your tasks by date.</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-light rounded-pill px-4 shadow-sm" style="border-color: rgba(255,255,255,0.2);" onclick="goToToday()">Today</button>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="openCreateModal()"><i class="bi bi-plus-lg me-1"></i> New Task</button>
            </div>
        </div>

        <div class="row g-4">
            <!-- Main Calendar Area -->
            <div class="col-12 col-xl-9">
                <div class="glass-card p-3 p-md-4">
                    
                    <!-- 2. Navigation Bar -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex align-items-center gap-3">
                            <div class="btn-group bg-dark rounded-pill p-1 shadow-sm" style="border: 1px solid rgba(255,255,255,0.1);">
                                <button class="btn btn-sm text-primary px-3 fw-bold bg-transparent border-0 rounded-pill" onclick="prevMonth()"><i class="bi bi-chevron-left"></i></button>
                                <button class="btn btn-sm text-primary px-3 fw-bold bg-transparent border-0 rounded-pill" onclick="nextMonth()"><i class="bi bi-chevron-right"></i></button>
                            </div>
                            <h4 class="text-primary fw-bold mb-0" id="currentMonthYearDisplay" style="min-width: 150px;">March 2026</h4>
                        </div>
                        
                        <!-- View Switcher -->
                        <div class="btn-group bg-dark rounded-pill p-1 d-none d-sm-flex" style="border: 1px solid rgba(255,255,255,0.1);">
                            <button class="btn btn-sm text-primary px-3 rounded-pill" style="background: rgba(255,255,255,0.1);">Month</button>
                            <button class="btn btn-sm text-muted px-3 rounded-pill bg-transparent border-0">Week</button>
                        </div>
                    </div>

                    <!-- 3. Calendar Grid -->
                    <div class="calendar-grid shadow-sm" id="calendarGrid">
                        <!-- Days of week header -->
                        <div class="calendar-day-header">Sun</div>
                        <div class="calendar-day-header">Mon</div>
                        <div class="calendar-day-header">Tue</div>
                        <div class="calendar-day-header">Wed</div>
                        <div class="calendar-day-header">Thu</div>
                        <div class="calendar-day-header">Fri</div>
                        <div class="calendar-day-header">Sat</div>
                        
                        <!-- Dates rendered via JS -->
                    </div>

                    <!-- 7. Legend -->
                    <div class="d-flex align-items-center gap-4 mt-4 ps-2">
                        <div class="d-flex align-items-center gap-2 small text-muted">
                            <span class="rounded-circle" style="width: 10px; height: 10px; background: #818cf8;"></span> Pending
                        </div>
                        <div class="d-flex align-items-center gap-2 small text-muted">
                            <span class="rounded-circle" style="width: 10px; height: 10px; background: #34d399;"></span> Completed
                        </div>
                        <div class="d-flex align-items-center gap-2 small text-muted">
                            <span class="rounded-circle" style="width: 10px; height: 10px; background: #f87171;"></span> Overdue
                        </div>
                    </div>

                </div>
            </div>

            <!-- 6. Upcoming Tasks Sidebar -->
            <div class="col-12 col-xl-3">
                <div class="glass-card p-4 h-100 position-sticky" style="top: 20px;">
                    <h6 class="fw-bold text-primary mb-4 text-uppercase border-bottom pb-3" style="border-color: rgba(255,255,255,0.1) !important; letter-spacing: 0.05em;">
                        <i class="bi bi-list-stars text-primary me-2"></i>Upcoming Tasks
                    </h6>
                    
                    <div id="upcomingTasksList" class="d-flex flex-column gap-2">
                        <!-- Rendered via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. Task Details Popover / Modal -->
        <div class="modal fade glass-modal" id="taskDetailsModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content text-start border-0">
                    <div class="modal-header border-bottom border-light border-opacity-10 pb-3">
                        <div class="d-flex flex-column w-100">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span id="detailStatus" class="badge"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <h4 class="modal-title fw-bold text-primary mb-1" id="detailTitle">Task Title</h4>
                            <div class="d-flex gap-2 align-items-center text-muted small">
                                <span><i class="bi bi-calendar-event me-1"></i> Due: <span id="detailDue"></span></span>
                                <span>&bull;</span>
                                <span id="detailPriority" class="badge"></span>
                            </div>
                        </div>
                    </div>
                    <div class="modal-body custom-scrollbar text-primary  pt-4 pb-4">
                        <p id="detailDescription" class="mb-0" style="line-height: 1.6;">Full task description goes here.</p>
                    </div>
                    <div class="modal-footer border-top border-light border-opacity-10 py-3 d-flex justify-content-between">
                        <button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="deleteCurrentTask()">
                            <i class="bi bi-trash me-1"></i> Delete
                        </button>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="editCurrentTask()">
                                <i class="bi bi-pencil me-1"></i> Edit
                            </button>
                            <button type="button" class="btn btn-success btn-sm rounded-pill px-3" id="btnDetailsComplete" onclick="toggleCurrentTaskComplete()">
                                <i class="bi bi-check2"></i> Mark Complete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5. Create / Edit Task Modal -->
        <div class="modal fade glass-modal" id="taskFormModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content text-start border-0">
                    <div class="modal-header border-bottom border-light border-opacity-10">
                        <h5 class="modal-title fw-bold text-primary" id="formModalTitle">Create Scheduled Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body custom-scrollbar pt-4 text-primary">
                        <form id="taskForm">
                            <input type="hidden" id="formTaskId">
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Title *</label>
                                <input type="text" id="formTaskTitle" class="form-control form-control-lg bg-transparent text-primary border-secondary shadow-none" placeholder="Task name..." required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Description</label>
                                <textarea id="formTaskDesc" class="form-control bg-transparent text-primary border-secondary shadow-none" rows="2" placeholder="Details..."></textarea>
                            </div>
                            <div class="row g-3 mb-2">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">Due Date</label>
                                    <input type="date" id="formTaskDue" class="form-control bg-transparent text-primary border-secondary shadow-none color-scheme-dark">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">Priority</label>
                                    <select id="formTaskPriority" class="form-select bg-transparent text-primary border-secondary shadow-none">
                                        <option value="Low" class="text-dark">Low</option>
                                        <option value="Medium" class="text-dark" selected>Medium</option>
                                        <option value="High" class="text-dark">High</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mt-3 d-none" id="formStatusContainer">
                                <label class="form-label text-muted small fw-bold">Status</label>
                                <select id="formTaskStatus" class="form-select bg-transparent text-primary border-secondary shadow-none">
                                    <option value="pending" class="text-dark">Pending</option>
                                    <option value="completed" class="text-dark">Completed</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-top border-light border-opacity-10 py-3">
                        <button type="button" class="btn btn-link text-muted text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="saveTask()">Save Task</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MOCK DATA & CALENDAR LOGIC SCRIPT -->
        <script>
            // State
            let currentDate = new Date(); // Tracks the currently viewed month/year
            currentDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            let viewingTaskId = null;
            let editingTaskId = null;

            // Mock Tasks
            // Spread tasks across the current month for demonstration
            let currentY = today.getFullYear();
            let currentM = String(today.getMonth() + 1).padStart(2, '0');
            
            let mockTasks = [
                { id: 1, title: 'Q1 Review Meeting', description: 'Review Q1 performance with the board.', status: 'completed', priority: 'High', dueDate: `${currentY}-${currentM}-05` },
                { id: 2, title: 'Server Maintenance', description: 'Monthly security patching and updates.', status: 'pending', priority: 'Medium', dueDate: `${currentY}-${currentM}-15` },
                { id: 3, title: 'Submit Expense Reports', description: 'Submit all travel expenses for reimbursement.', status: 'overdue', priority: 'Low', dueDate: `${currentY}-${currentM}-10` },
                { id: 4, title: 'Project Kickoff', description: 'Kickoff meeting for Project Alpha.', status: 'pending', priority: 'High', dueDate: `${currentY}-${currentM}-22` },
                { id: 5, title: 'Client Feedback Call', description: 'Discuss recent delivery feedback with client X.', status: 'pending', priority: 'Medium', dueDate: `${currentY}-${currentM}-24` },
                { id: 6, title: 'Team Outing', description: 'Quarterly team building event.', status: 'pending', priority: 'Low', dueDate: `${currentY}-${currentM}-28` },
                { id: 7, title: 'Code Freeze', description: 'Finalize branch for v2.0 release.', status: 'pending', priority: 'High', dueDate: `${currentY}-${currentM}-30` },
            ];

            // Bootstrap Modals
            let detailsModal;
            let formModal;

            document.addEventListener('DOMContentLoaded', () => {
                detailsModal = new bootstrap.Modal(document.getElementById('taskDetailsModal'));
                formModal = new bootstrap.Modal(document.getElementById('taskFormModal'));
                
                renderCalendar();
            });

            // --- Calendar Logic ---
            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                // Update Header Display
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                document.getElementById('currentMonthYearDisplay').innerText = `${monthNames[month]} ${year}`;

                // Logic for grid dates
                const firstDayOfMonth = new Date(year, month, 1);
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startingDay = firstDayOfMonth.getDay(); // 0 = Sun, 1 = Mon, etc.
                
                // Track dates for grid
                const calendarGrid = document.getElementById('calendarGrid');
                // clear all except headers
                const headersHtml = `
                    <div class="calendar-day-header">Sun</div>
                    <div class="calendar-day-header">Mon</div>
                    <div class="calendar-day-header">Tue</div>
                    <div class="calendar-day-header">Wed</div>
                    <div class="calendar-day-header">Thu</div>
                    <div class="calendar-day-header">Fri</div>
                    <div class="calendar-day-header">Sat</div>
                `;
                let cellsHtml = '';

                // Previous month padding
                const prevMonthDays = new Date(year, month, 0).getDate();
                for (let i = startingDay - 1; i >= 0; i--) {
                    cellsHtml += createCellHtml(year, month - 1, prevMonthDays - i, true);
                }

                // Current month days
                for (let i = 1; i <= daysInMonth; i++) {
                    cellsHtml += createCellHtml(year, month, i, false);
                }

                // Next month padding (complete grid to 42 cells typically, or 35)
                const totalCells = startingDay + daysInMonth;
                const nextMonthPadding = (totalCells > 35) ? 42 - totalCells : 35 - totalCells;
                for (let i = 1; i <= nextMonthPadding; i++) {
                    cellsHtml += createCellHtml(year, month + 1, i, true);
                }

                calendarGrid.innerHTML = headersHtml + cellsHtml;
                
                renderUpcomingSidebar();
            }

            function createCellHtml(year, monthIndex, dayStr, isOtherMonth) {
                // Adjust year/month overflow safely via Date object wrapper
                const d = new Date(year, monthIndex, dayStr);
                const dYear = d.getFullYear();
                const dMonth = String(d.getMonth() + 1).padStart(2, '0');
                const dDay = String(d.getDate()).padStart(2, '0');
                const isoDateStr = `${dYear}-${dMonth}-${dDay}`;
                
                let isToday = false;
                if (!isOtherMonth) {
                    if (d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear()) {
                        isToday = true;
                    }
                }

                const cellClasses = ['calendar-cell'];
                if (isOtherMonth) cellClasses.push('other-month');
                if (isToday) cellClasses.push('today');

                // Get tasks for this specific date
                const dayTasks = mockTasks.filter(t => t.dueDate === isoDateStr);
                
                let tasksHtml = '';
                const maxPreview = 3;
                dayTasks.slice(0, maxPreview).forEach(t => {
                    const tCls = `task-${t.status}`; // .task-completed, .task-pending, .task-overdue
                    // Drag and drop event placeholders via 'draggable'
                    tasksHtml += `<div class="cal-task-item shadow-sm ${tCls}" onclick="event.stopPropagation(); openTaskDetails(${t.id})">
                        ${t.title}
                    </div>`;
                });

                if (dayTasks.length > maxPreview) {
                    tasksHtml += `<button class="more-tasks-btn" onclick="event.stopPropagation(); openCreateModal('${isoDateStr}')">
                        +${dayTasks.length - maxPreview} more
                    </button>`;
                }

                return `
                    <div class="${cellClasses.join(' ')}" onclick="openCreateModal('${isoDateStr}')" 
                         ondragover="event.preventDefault(); this.classList.add('drag-over')" 
                         ondragleave="this.classList.remove('drag-over')" 
                         ondrop="this.classList.remove('drag-over'); handleDrop(event, '${isoDateStr}')">
                        <div class="d-flex justify-content-end w-100">
                            <span class="date-number">${d.getDate()}</span>
                        </div>
                        ${tasksHtml}
                    </div>
                `;
            }

            function prevMonth() {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            }

            function nextMonth() {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            }

            function goToToday() {
                currentDate = new Date();
                currentDate.setHours(0,0,0,0);
                renderCalendar();
            }

            // --- Upcoming Sidebar ---
            function renderUpcomingSidebar() {
                const sidebar = document.getElementById('upcomingTasksList');
                // Get tasks from today onwards, up to 7 days
                const in7Days = new Date(today);
                in7Days.setDate(in7Days.getDate() + 7);
                
                let upcoming = mockTasks.filter(t => {
                    const td = new Date(t.dueDate);
                    if (t.status === 'completed') return false;
                    return td >= today && td <= in7Days;
                });

                // Also include overdues in upcoming if pending!
                let overdues = mockTasks.filter(t => t.status === 'overdue' || (t.status === 'pending' && new Date(t.dueDate) < today));

                let combined = [...new Set([...overdues, ...upcoming])];
                combined.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));

                if (combined.length === 0) {
                    sidebar.innerHTML = `
                        <div class="text-center p-4">
                            <i class="bi bi-emoji-smile text-muted fs-1 mb-2"></i>
                            <p class="text-muted small">No upcoming tasks! You're all caught up.</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                combined.slice(0, 6).forEach(t => {
                    let dateLabel = t.dueDate;
                    const d = new Date(t.dueDate);
                    if (d.getTime() === today.getTime()) dateLabel = "Today";
                    else if (d.getTime() < today.getTime()) dateLabel = "Overdue";
                    else if (d.getDate() === today.getDate() + 1) dateLabel = "Tomorrow";

                    let iconCls = t.status === 'overdue' ? 'bi-exclamation-circle text-danger' : 'bi-calendar text-muted';
                    if (dateLabel==='Overdue') t.status = 'overdue';

                    html += `
                        <div class="bg-transparent border-bottom px-3 py-3 sidebar-task ${t.status}" style="border-color: rgba(255,255,255,0.05) !important; cursor:pointer;" onclick="openTaskDetails(${t.id})">
                            <h6 class="text-primary small fw-bold mb-1 text-truncate">${t.title}</h6>
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted"><i class="bi ${iconCls} me-1 "></i> ${dateLabel}</small>
                                <span class="badge ${t.priority==='High'?'bg-danger':(t.priority==='Medium'?'bg-warning':'bg-info')} bg-opacity-10 ">${t.priority}</span>
                            </div>
                        </div>
                    `;
                });
                sidebar.innerHTML = html;
            }

            // --- Modals ---
            function openTaskDetails(id) {
                viewingTaskId = id;
                const task = mockTasks.find(t => t.id === id);
                if (!task) return;

                document.getElementById('detailTitle').innerText = task.title;
                document.getElementById('detailDescription').innerText = task.description || "No description.";
                document.getElementById('detailDue').innerText = task.dueDate;
                
                // Status Badge
                const statBadge = document.getElementById('detailStatus');
                if(task.status==='completed') {
                    statBadge.className="badge bg-success bg-opacity-25 text-success rounded-pill px-3 py-2";
                    statBadge.innerText="COMPLETED";
                } else if(task.status==='overdue') {
                    statBadge.className="badge bg-danger bg-opacity-25 text-danger rounded-pill px-3 py-2";
                    statBadge.innerText="OVERDUE";
                } else {
                    statBadge.className="badge bg-primary bg-opacity-25 text-primary rounded-pill px-3 py-2";
                    statBadge.innerText="PENDING";
                }

                // Priority
                const p = task.priority;
                const prioBadge = document.getElementById('detailPriority');
                prioBadge.className = `badge ${p==='High'?'bg-danger':(p==='Medium'?'bg-warning':'bg-info')} bg-opacity-10`;
                prioBadge.innerText = p + " Priority";

                // Complete btn
                const btnComp = document.getElementById('btnDetailsComplete');
                if(task.status === 'completed') {
                    btnComp.className="btn btn-outline-warning btn-sm rounded-pill px-3";
                    btnComp.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Mark Pending';
                } else {
                    btnComp.className="btn btn-success btn-sm rounded-pill px-3";
                    btnComp.innerHTML = '<i class="bi bi-check2"></i> Mark Complete';
                }

                detailsModal.show();
            }

            function openCreateModal(dateStr = null) {
                editingTaskId = null;
                document.getElementById('taskForm').reset();
                document.getElementById('formStatusContainer').classList.add('d-none');
                document.getElementById('formModalTitle').innerText = "Create Scheduled Task";
                
                if (dateStr) {
                    document.getElementById('formTaskDue').value = dateStr;
                } else {
                    document.getElementById('formTaskDue').value = today.toISOString().split('T')[0];
                }
                formModal.show();
            }

            function editCurrentTask() {
                if(!viewingTaskId) return;
                detailsModal.hide();
                
                editingTaskId = viewingTaskId;
                const task = mockTasks.find(t => t.id === viewingTaskId);
                document.getElementById('formTaskId').value = task.id;
                document.getElementById('formTaskTitle').value = task.title;
                document.getElementById('formTaskDesc').value = task.description;
                document.getElementById('formTaskDue').value = task.dueDate;
                document.getElementById('formTaskPriority').value = task.priority;
                
                document.getElementById('formStatusContainer').classList.remove('d-none');
                document.getElementById('formTaskStatus').value = task.status==='overdue' ? 'pending' : task.status; // Overdue is derived usually, but let's allow setting it to pending/completed
                
                document.getElementById('formModalTitle').innerText = "Edit Scheduled Task";
                formModal.show();
            }

            function toggleCurrentTaskComplete() {
                const task = mockTasks.find(t => t.id === viewingTaskId);
                if(task) {
                    task.status = task.status === 'completed' ? 'pending' : 'completed';
                    if(task.status === 'pending' && new Date(task.dueDate) < today) {
                        task.status = 'overdue';
                    }
                    openTaskDetails(task.id);
                    renderCalendar();
                }
            }

            function deleteCurrentTask() {
                mockTasks = mockTasks.filter(t => t.id !== viewingTaskId);
                detailsModal.hide();
                renderCalendar();
            }

            function saveTask() {
                const title = document.getElementById('formTaskTitle').value.trim();
                const due = document.getElementById('formTaskDue').value;
                if(!title || !due) {
                    alert('Title and due date are required!');
                    return;
                }
                
                const desc = document.getElementById('formTaskDesc').value;
                const prio = document.getElementById('formTaskPriority').value;
                
                let derivedStatus = new Date(due) < today ? 'overdue' : 'pending';

                if(editingTaskId) {
                    let manualStatus = document.getElementById('formTaskStatus').value; // if user marks it implicitly
                    if (manualStatus === 'completed') derivedStatus = 'completed';

                    const t = mockTasks.find(t => t.id === editingTaskId);
                    t.title = title;
                    t.description = desc;
                    t.dueDate = due;
                    t.priority = prio;
                    t.status = derivedStatus;
                } else {
                    const newId = Math.max(-1, ...mockTasks.map(t=>t.id)) + 1;
                    mockTasks.push({
                        id: newId, 
                        title: title, 
                        description: desc, 
                        dueDate: due, 
                        priority: prio, 
                        status: derivedStatus,
                        createdDate: new Date().toISOString().split('T')[0]
                    });
                }
                
                formModal.hide();
                renderCalendar();
            }

            // --- Drag & Drop Placeholder ---
            function handleDrop(event, targetDate) {
                // Here you would capture dataTransfer payload if dragging items.
                // For now, this is wired up in HTML to allow visual feedback (.drag-over class logic).
                renderCalendar();
            }
        </script>
    </div>
</body>
