<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="${task.id == null ? 'Add Task' : 'Edit Task'}">Task Form</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card p-4 p-lg-5">
                    <div class="mb-4">
                        <a th:href="@{/tasks}" class="text-decoration-none text-muted small">
                            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                        </a>
                        <h2 class="fw-bold mt-2" th:text="${task.id == null ? 'New Task' : 'Edit Task'}">New Task</h2>
                        <p class="text-muted"
                            th:text="${task.id == null ? 'Define your next objective' : 'Update your task details'}">
                            Task details</p>
                    </div>

                    <form th:action="@{/tasks}" th:object="${task}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{completed}">

                        <div class="mb-4">
                            <label for="title" class="form-label fw-bold">Title <span
                                    class="text-danger">*</span></label>
                            <input type="text" th:field="*{title}"
                                class="form-control form-control-lg bg-light border-0 px-4 py-3" id="title"
                                placeholder="What needs to be done?" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                                Title error
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea th:field="*{description}" class="form-control bg-light border-0 px-4 py-3"
                                id="description" rows="4" placeholder="Add some context..."></textarea>
                        </div>

                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow">
                                <i class="bi bi-check-lg me-2"></i>
                                <span th:text="${task.id == null ? 'Create Task' : 'Update Task'}">Save</span>
                            </button>
                            <a th:href="@{/tasks}" class="btn btn-light border-0">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
