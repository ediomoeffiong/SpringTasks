<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Task Dashboard</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h2 class="fw-bold mb-1">Your Tasks</h2>
                <p class="text-muted mb-0">Manage and track your progress</p>
            </div>
            <div class="btn-group shadow-sm">
                <a th:href="@{/tasks}" class="btn btn-white border px-4"
                    th:classappend="${activeStatus == 'all' ? 'active btn-primary text-white border-0' : 'bg-white text-dark'}">All</a>
                <a th:href="@{/tasks(status='pending')}" class="btn btn-white border px-4"
                    th:classappend="${activeStatus == 'pending' ? 'active btn-primary text-white border-0' : 'bg-white text-dark'}">Pending</a>
                <a th:href="@{/tasks(status='completed')}" class="btn btn-white border px-4"
                    th:classappend="${activeStatus == 'completed' ? 'active btn-primary text-white border-0' : 'bg-white text-dark'}">Completed</a>
            </div>
        </div>

        <div th:if="${tasks.empty}" class="text-center py-5">
            <div class="mb-4">
                <i class="bi bi-journal-x display-1 text-muted opacity-25"></i>
            </div>
            <h4 class="text-muted">No tasks found</h4>
            <p>Ready to get started? Create your first task!</p>
            <a th:href="@{/tasks/new}" class="btn btn-primary mt-3">Add New Task</a>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${!tasks.empty}">
            <div class="col" th:each="task : ${tasks}">
                <div class="card h-100 transition-hover">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="badge rounded-pill"
                                th:classappend="${task.completed ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning'}"
                                th:text="${task.completed ? 'Completed' : 'Pending'}">Status</span>

                            <div class="dropdown">
                                <button class="btn btn-link text-muted p-0" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow">
                                    <li><a class="dropdown-item" th:href="@{/tasks/edit/{id}(id=${task.id})}"><i
                                                class="bi bi-pencil me-2"></i>Edit</a></li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li>
                                        <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post"
                                            onsubmit="return confirm('Are you sure you want to delete this task?')">
                                            <button type="submit" class="dropdown-item text-danger"><i
                                                    class="bi bi-trash me-2"></i>Delete</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <h5 class="card-title fw-bold mb-2" th:classappend="${task.completed ? 'task-done' : ''}"
                            th:text="${task.title}">Task Title</h5>
                        <p class="card-text text-muted mb-4" th:text="${task.description}">Short description of the
                            task.</p>

                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="text-muted small"
                                th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">Date</span>

                            <form th:action="@{/tasks/toggle/{id}(id=${task.id})}" method="post">
                                <button type="submit" class="btn btn-sm px-3 rounded-pill"
                                    th:classappend="${task.completed ? 'btn-outline-secondary' : 'btn-outline-primary'}">
                                    <i class="bi"
                                        th:classappend="${task.completed ? 'bi-arrow-counterclockwise' : 'bi-check2'}"></i>
                                    <span th:text="${task.completed ? 'Undo' : 'Complete'}">Action</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
