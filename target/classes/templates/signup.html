<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Sign Up | SpringTasks</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-body">
    <div layout:fragment="content">
        <div class="auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="/" class="auth-brand d-inline-flex align-items-center mb-3">
                    <i class="bi bi-layers-fill me-2 fs-3"></i>
                    <span>SpringTasks</span>
                </a>
                <h2 class="auth-title">Create Your Account</h2>
                <p class="auth-subtitle">Join us and start organizing your tasks</p>
            </div>

            <form th:action="@{/signup}" method="post" class="auth-form">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                        required>
                    <label for="username">Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com"
                        required autocomplete="email">
                    <label for="email">Email address</label>
                    <div class="invalid-feedback">Valid email is required.</div>
                </div>

                <div class="form-floating mb-3 password-wrapper">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required autocomplete="new-password">
                    <label for="password">Password</label>
                    <i class="bi bi-eye password-toggle" id="toggle-password"></i>
                </div>

                <div class="mb-3">
                    <div class="strength-meter">
                        <div class="strength-meter-fill"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-1">
                        <small class="text-muted">Password Strength: <span id="strength-text"
                                class="fw-bold"></span></small>
                    </div>
                </div>

                <div class="form-floating mb-4 password-wrapper">
                    <input type="password" class="form-control" id="confirm-password" name="confirmPassword"
                        placeholder="Confirm Password" required autocomplete="new-password">
                    <label for="confirm-password">Confirm Password</label>
                    <i class="bi bi-eye password-toggle" id="toggle-confirm-password"></i>
                </div>

                <button type="submit" class="btn-auth">
                    <span>Register</span>
                    <img src="https://i.gifer.com/ZZ5H.gif" class="loading-spinner" alt="loading">
                </button>

                <div class="text-center mt-4">
                    <p class="text-muted small">Already have an account?
                        <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Log In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
