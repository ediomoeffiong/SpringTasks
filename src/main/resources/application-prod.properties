# Production Environment Properties
spring.datasource.driverClassName=org.postgresql.Driver

# We map individual variables to construct the JDBC URL automatically.
# Make sure to create DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, and DB_PASSWORD env vars on Render.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable the H2 Console for security in production
spring.h2.console.enabled=false

# Render handles SSL for Postgres, you might need to append ?sslmode=require 
# to your JDBC url if it's strict, but usually Render's internal connections don't require it.
