<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE | $CONTENT_TITLE">SpringTasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6366f1;
            --bg-glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            transition: transform 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0.75rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .task-done {
            text-decoration: line-through;
            color: #64748b;
        }

        .glass-container {
            padding: 2rem 0;
        }

        /* Prevent layout shift during auth page loading */
        [layout\:fragment="content"] {
            min-height: 70vh;
        }

        /* App Wrapper & Sidebar */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            background-color: #0b1220;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1040;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-header i {
            color: var(--primary-color);
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .sidebar-menu::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-menu::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .sidebar-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-link:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .sidebar-link.active {
            color: #ffffff;
            background-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
            font-weight: 600;
        }
        
        .sidebar-link.active:hover {
            transform: none;
        }

        .sidebar-link i {
            font-size: 1.1rem;
            width: 1.25rem;
            text-align: center;
            transition: color 0.2s;
        }

        .sidebar-link:hover i {
            color: var(--primary-color);
        }

        .sidebar-link.active i {
            color: #ffffff;
        }

        .sidebar-footer {
            padding: 1rem 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logout-link:hover i {
            color: #ef4444;
        }

        .main-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-width: 0;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Auth Layout (Sidebar active) */
        .auth-layout .main-content-wrapper {
            margin-left: 260px;
        }

        .mobile-header {
            display: none !important;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 18, 32, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1035;
            display: none;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-overlay.show {
            display: block;
            opacity: 1;
        }

        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .auth-layout .main-content-wrapper {
                margin-left: 0;
            }
            .mobile-header {
                display: flex !important;
                align-items: center;
                padding: 1rem;
                background: var(--bg-glass);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.3);
                position: sticky;
                top: 0;
                z-index: 1030;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            .mobile-header-btn {
                background: transparent;
                border: none;
                font-size: 1.5rem;
                color: #1e293b;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: color 0.2s;
                padding: 0;
            }
            .mobile-header-btn:hover {
                color: var(--primary-color);
            }
        }
    </style>
</head>

<body>

    <div th:class="${#authorization.expression('isAuthenticated()') and currentUri != '/'} ? 'app-wrapper auth-layout' : 'app-wrapper non-auth-layout'">
        <!-- AUTH SIDEBAR -->
        <th:block sec:authorize="isAuthenticated()" th:if="${currentUri != '/'}">
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            <aside class="sidebar" id="appSidebar">
                <div class="sidebar-header">
                    <i class="bi bi-layers-fill"></i> SpringTasks
                </div>
                <!-- Add Task Button Option in Sidebar -->
                <div class="px-3 pb-2 pt-1">
                    <a th:href="@{/tasks/new}" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" th:classappend="${currentUri == '/tasks/new'} ? 'active' : ''">
                        <i class="bi bi-plus-lg"></i> Add Task
                    </a>
                </div>
                <nav class="sidebar-menu">
                    <div class="sidebar-section-title">Main</div>
                    <a th:href="@{/tasks}" class="sidebar-link" th:classappend="${currentUri == '/tasks' or currentUri == '/'} ? 'active' : ''">
                        <i class="bi bi-grid-1x2-fill"></i> Dashboard
                    </a>
                    <a th:href="@{/my-tasks}" class="sidebar-link" th:classappend="${currentUri == '/my-tasks'} ? 'active' : ''">
                        <i class="bi bi-check2-square"></i> My Tasks
                    </a>
                    <a th:href="@{/calendar}" class="sidebar-link" th:classappend="${currentUri == '/calendar'} ? 'active' : ''">
                        <i class="bi bi-calendar3"></i> Calendar
                    </a>
                    <a th:href="@{/categories}" class="sidebar-link" th:classappend="${currentUri == '/categories'} ? 'active' : ''">
                        <i class="bi bi-tags"></i> Categories
                    </a>
                    <a th:href="@{/analytics}" class="sidebar-link" th:classappend="${currentUri != null and currentUri.startsWith('/analytics')} ? 'active' : ''">
                        <i class="bi bi-graph-up-arrow"></i> Analytics
                    </a>
                    <a th:href="@{/notifications}" class="sidebar-link" th:classappend="${currentUri == '/notifications'} ? 'active' : ''">
                        <i class="bi bi-bell"></i> Notifications
                    </a>

                    <div class="sidebar-section-title">Account</div>
                    <a th:href="@{/profile}" class="sidebar-link" th:classappend="${currentUri == '/profile'} ? 'active' : ''">
                        <i class="bi bi-person-circle"></i> Profile
                    </a>
                    <a th:href="@{/settings}" class="sidebar-link" th:classappend="${currentUri == '/settings'} ? 'active' : ''">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="sidebar-link w-100 border-0 bg-transparent text-start logout-link" style="cursor: pointer;">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </div>
            </aside>
        </th:block>

        <div class="main-content-wrapper w-100">
            <!-- MOBILE HEADER ONLY FOR AUTH -->
            <th:block sec:authorize="isAuthenticated()" th:if="${currentUri != '/'}">
                <header class="mobile-header d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2" style="color: var(--primary-color); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.025em;">
                        <i class="bi bi-layers-fill"></i> SpringTasks
                    </div>
                    <button class="mobile-header-btn" id="sidebarToggle" aria-label="Toggle Sidebar">
                        <i class="bi bi-list"></i>
                    </button>
                </header>
            </th:block>

            <!-- NON-AUTH HEADER (LANDING PAGE) -->
            <th:block th:if="${!#authorization.expression('isAuthenticated()') or currentUri == '/'}">
                <nav class="navbar navbar-expand-lg px-lg-5 px-3 py-3" style="background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1030; position: sticky; top: 0;">
                    <div class="container-fluid">
                        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}" style="color: var(--primary-color); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.025em;">
                            <i class="bi bi-layers-fill"></i> SpringTasks
                        </a>
                        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nonAuthNav" aria-controls="nonAuthNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="nonAuthNav">
                            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                                <li class="nav-item">
                                    <a class="nav-link fw-bold px-0" style="color: #475569;" th:href="@{/login}">Login</a>
                                </li>
                                <li class="nav-item">
                                    <a class="btn btn-primary fw-bold text-white px-4 rounded-pill shadow-sm" th:href="@{/signup}">Sign Up free</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </th:block>

            <main class="container glass-container" th:classappend="${#authorization.expression('isAuthenticated()') and currentUri != '/'} ? 'px-lg-5 container-fluid' : ''">
                <div layout:fragment="content">
                    <!-- Page content goes here -->
                </div>
            </main>

            <footer class="py-4 mt-auto">
                <div class="container text-center text-muted">
                    <small>&copy; 2026 SpringTasks.</small>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('appSidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (sidebarToggle && sidebar && overlay) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.add('show');
                    overlay.classList.add('show');
                });

                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                });
            }
        });
    </script>
</body>
</html>
