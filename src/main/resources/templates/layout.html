<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE | $CONTENT_TITLE">SpringTasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6366f1;
            --bg-glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .navbar {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--primary-color) !important;
        }

        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            transition: transform 0.2s;
        }

        .navbar-nav .nav-link {
            font-weight: 500;
            color: #475569 !important;
            padding: 0.6rem 1.25rem !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-nav .nav-link:hover {
            color: var(--primary-color) !important;
            background: rgba(79, 70, 229, 0.05);
        }

        .navbar-nav .nav-link.active {
            background-color: var(--primary-color) !important;
            color: #ffffff !important;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        .nav-auth-btn {
            border-radius: 0.75rem;
            font-weight: 600;
            padding: 0.6rem 1.5rem !important;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0.75rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .task-done {
            text-decoration: line-through;
            color: #64748b;
        }

        .glass-container {
            padding: 2rem 0;
        }

        /* Prevent layout shift during auth page loading */
        [layout\:fragment="content"] {
            min-height: 70vh;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-layers-fill me-2"></i>SpringTasks
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/tasks}"
                           th:classappend="${currentUri == '/tasks'} ? 'active' : ''">
                            <i class="bi bi-grid-1x2-fill"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}"
                           th:classappend="${currentUri == '/login'} ? 'active' : ''">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/signup}"
                           th:classappend="${currentUri == '/signup'} ? 'active' : ''">Sign Up</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/tasks/new}"
                           th:classappend="${currentUri == '/tasks/new'} ? 'active' : ''">
                            <i class="bi bi-plus-lg"></i> Add Task
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="nav-link border-0 bg-transparent text-danger w-100"
                                    style="cursor: pointer;">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container glass-container">
        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </main>

    <footer class="py-4 mt-auto">
        <div class="container text-center text-muted">
            <small>&copy; 2026 SpringTasks.</small>
            <!--<small>&copy; 2026 SpringTasks. Built with <i class="bi bi-heart-fill text-danger"></i> using Spring Boot.</small>-->
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
