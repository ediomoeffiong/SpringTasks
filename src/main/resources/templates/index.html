<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Welcome to SpringTasks</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="row min-vh-75 align-items-center">
            <div class="col-lg-6">
                <h1 class="display-3 fw-bold mb-4">Master Your Workflow with <span
                        class="text-primary">SpringTasks</span></h1>
                <p class="lead text-muted mb-5">
                    A minimal, server-side rendered task manager designed for speed and simplicity.
                    Organize your life one task at a time.
                </p>
                <div class="d-flex gap-3">
                    <a th:href="@{/tasks}" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-rocket-takeoff me-2"></i>View Dashboard
                    </a>
                    <a th:href="@{/tasks/new}" class="btn btn-outline-primary btn-lg px-5">
                        <i class="bi bi-plus-circle me-2"></i>Add Task
                    </a>
                </div>
            </div>
            <div class="col-lg-6 d-none d-lg-block">
                <div class="card p-5 border-0 shadow-lg bg-white">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-4 mr-3">
                            <i class="bi bi-check2-square text-primary fs-3"></i>
                        </div>
                        <h4 class="mb-0 ms-3 fw-bold text-dark">Smart Task Management</h4>
                    </div>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-lightning-fill text-warning me-3"></i>
                            <span>Instant server-side rendering</span>
                        </li>
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-shield-lock-fill text-success me-3"></i>
                            <span>Built-in CSRF protection</span>
                        </li>
                        <li class="d-flex align-items-center">
                            <i class="bi bi-phone-fill text-info me-3"></i>
                            <span>Fully responsive design</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
